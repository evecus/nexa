name: build-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)，留空则自动生成'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_suffix: linux-amd64
          - goos: linux
            goarch: arm64
            asset_suffix: linux-arm64
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          GOPROXY: https://goproxy.cn,direct
        run: |
          go build -trimpath -ldflags='-s -w -X main.version=${GITHUB_REF_NAME:-dev}' -o nexa ./cmd/nexa
          file nexa

      - name: package
        run: |
          mkdir -p pkg/nexa/etc/init.d pkg/nexa/usr/bin
          cp nexa pkg/nexa/usr/bin/nexa
          cp openwrt/nexa.init pkg/nexa/etc/init.d/nexa
          chmod +x pkg/nexa/etc/init.d/nexa
          cd pkg && tar -czf ../nexa-${{ matrix.asset_suffix }}.tar.gz nexa
          cd ..
          # 同时输出裸二进制，方便直接 ./nexa 运行
          cp nexa nexa-${{ matrix.asset_suffix }}
          ls -lh nexa-${{ matrix.asset_suffix }} nexa-${{ matrix.asset_suffix }}.tar.gz

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: test
          name: nexa test
          files: |
            nexa-linux-amd64
            nexa-linux-arm64
