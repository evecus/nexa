name: build-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)，留空则自动生成'
        required: false
        default: '1.0.0'
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_suffix: linux-x86_64
          - goos: linux
            goarch: arm64
            asset_suffix: linux-aarch64
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
          GOPROXY: https://goproxy.cn,direct
        run: |
          go build -trimpath -ldflags='-s -w -X main.version=${GITHUB_REF_NAME:-dev}' -o nexa ./cmd/nexa
          file nexa

      - name: package
        run: |
          cp nexa nexa-${{ matrix.asset_suffix }}
          ls -lh nexa-${{ matrix.asset_suffix }}

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "nexa v${{ github.event.inputs.version }}"
          files: |
            nexa-${{ matrix.asset_suffix }}
          env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
